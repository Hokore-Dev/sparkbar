<svg width="380" height="288" viewBox="0 0 380 288" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 13px; font-weight: 600; fill: #1d1d1f; }
    .detail { font-size: 11px; fill: #86868b; }
    .pct { font-size: 13px; font-weight: 600; }
    .reset { font-size: 11px; fill: #aeaeb2; }
    .foot { font-size: 11px; fill: #aeaeb2; }
    .menubar { font-size: 12px; fill: #1d1d1f; font-weight: 500; }
  </style>

  <!-- backdrop -->
  <rect width="380" height="288" rx="14" fill="#f2f2f7"/>

  <!-- menu bar strip -->
  <rect x="0" y="0" width="380" height="34" rx="14" fill="#ffffff"/>
  <rect x="0" y="20" width="380" height="14" fill="#ffffff"/>
  <text x="300" y="22" class="menubar">42%</text>
  <!-- menu bar glyph: usage ring (42%) + Claude spark, mirrors the app -->
  <circle cx="288" cy="16" r="6" fill="none" stroke="#34c759" stroke-opacity="0.30" stroke-width="1.6"/>
  <path d="M 288.00 10.00 A 6 6 0 0 1 290.89 21.26" fill="none" stroke="#34c759" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M 288.00 13.00 L 288.74 15.26 L 291.00 16.00 L 288.74 16.74 L 288.00 19.00 L 287.26 16.74 L 285.00 16.00 L 287.26 15.26 Z" fill="#34c759"/>

  <!-- popover card -->
  <rect x="14" y="44" width="352" height="230" rx="12" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>

  <!-- Session -->
  <text x="32" y="74" class="title">Session</text>
  <text x="86" y="74" class="detail">5-hour limit</text>
  <text x="348" y="74" text-anchor="end" class="pct" fill="#34c759">42%</text>
  <rect x="32" y="82" width="316" height="5" rx="2.5" fill="#e5e5ea"/>
  <rect x="32" y="82" width="133" height="5" rx="2.5" fill="#34c759"/>
  <text x="32" y="102" class="reset">Resets at 7:59 PM</text>

  <!-- Weekly all models -->
  <text x="32" y="132" class="title">Weekly</text>
  <text x="84" y="132" class="detail">All models</text>
  <text x="348" y="132" text-anchor="end" class="pct" fill="#34c759">18%</text>
  <rect x="32" y="140" width="316" height="5" rx="2.5" fill="#e5e5ea"/>
  <rect x="32" y="140" width="57" height="5" rx="2.5" fill="#34c759"/>
  <text x="32" y="160" class="reset">Resets on 21 Jun 2026 at 9:00 AM</text>

  <!-- Weekly Sonnet -->
  <text x="32" y="190" class="title">Weekly</text>
  <text x="84" y="190" class="detail">Sonnet</text>
  <text x="348" y="190" text-anchor="end" class="pct" fill="#34c759">23%</text>
  <rect x="32" y="198" width="316" height="5" rx="2.5" fill="#e5e5ea"/>
  <rect x="32" y="198" width="73" height="5" rx="2.5" fill="#34c759"/>
  <text x="32" y="218" class="reset">Resets on 21 Jun 2026 at 9:00 AM</text>

  <!-- divider -->
  <rect x="32" y="236" width="316" height="1" fill="#e5e5ea"/>

  <!-- footer -->
  <text x="32" y="256" class="foot">Updated 3:42 PM</text>
  <text x="348" y="256" text-anchor="end" class="foot">⟳</text>
</svg>
